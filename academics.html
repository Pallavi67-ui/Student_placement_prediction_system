<link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/css/bootstrap.min.css" rel="stylesheet">


<link rel="stylesheet" href="css/style.css">


</head>


<body>





<!-- ================= NAVBAR ================= -->


<nav class="navbar navbar-expand-lg">


<div class="container">


<a class="navbar-brand" href="dashboard.html">

Student Placement Portal

</a>




<div class="collapse navbar-collapse show">


<ul class="navbar-nav ms-auto">

<li class="nav-item">

Logout

</a>

</li>


</ul>


</div>



</div>


</nav>








<!-- ================= HEADER ================= -->


<section class="page-header">


<div class="container">


<h1>

Academic Details

</h1>


<p>

Provide your academic and skill information for placement prediction.

</p>


</div>


</section>









<!-- ================= FORM ================= -->


<section class="academic-section">


<div class="container">


<div class="academic-container">



<h2>

Student Profile Information

</h2>






<form>





<div class="row">



<div class="col-md-6 mb-4">


<label>

CGPA

</label>


<input type="number"
class="form-control"
placeholder="Enter CGPA"
step="0.01"
required>


</div>






<div class="col-md-6 mb-4">


<label>

Number of Backlogs

</label>


<input type="number"
class="form-control"
placeholder="Enter backlogs"
required>


</div>



</div>










<div class="row">



<div class="col-md-6 mb-4">


<label>

Internship Experience

</label>


<select class="form-control">


<option>Select</option>

<option>Yes</option>

<option>No</option>


</select>


</div>






<div class="col-md-6 mb-4">


<label>

Number of Projects

</label>


<input type="number"
class="form-control"
placeholder="Enter project count"
required>


</div>



</div>









<div class="row">



<div class="col-md-6 mb-4">


<label>

Certifications

</label>


<input type="number"
class="form-control"
placeholder="Number of certifications"
required>


</div>






<div class="col-md-6 mb-4">


<label>

Aptitude Score

</label>


<input type="number"
class="form-control"
placeholder="Enter aptitude score"
required>


</div>



</div>









<div class="mb-4">


<label>

Technical Skills

</label>


<textarea class="form-control"
rows="5"
placeholder="Example: Python, Java, MySQL, HTML, CSS"></textarea>


</div>







<a href="communication-assessment.html"
class="continue-btn">


Continue Assessment

</a>




</form>




</div>


</div>


</section>
