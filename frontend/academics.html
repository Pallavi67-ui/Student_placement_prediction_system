<!DOCTYPE html>
<html lang="en">

<head>

<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">

<title>Academic Details | Student Placement Portal</title>

<link href="https://fonts.googleapis.com/css2?family=Poppins:wght@300;400;500;600;700&display=swap" rel="stylesheet">

<link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/css/bootstrap.min.css" rel="stylesheet">

<link rel="stylesheet" href="{{ url_for('static', filename='css/style.css') }}">

</head>

<body>

<!-- ================= NAVBAR ================= -->

<nav class="navbar navbar-expand-lg">

<div class="container">

<a class="navbar-brand" href="/dashboard">
Student Placement Portal
</a>

<div class="collapse navbar-collapse show">

<ul class="navbar-nav ms-auto">

<li class="nav-item">
<a class="nav-link" href="/dashboard">
Dashboard
</a>
</li>

<li class="nav-item">
<a class="nav-link active" href="/academics">
Academic Details
</a>
</li>

<li class="nav-item">
<a class="nav-link" href="/login">
Logout
</a>
</li>

</ul>

</div>

</div>

</nav>

<!-- ================= HEADER ================= -->

<section class="page-header">

<div class="container">

<h1>
Academic Details
</h1>

<p>
Provide your academic and skill information for placement prediction.
</p>

</div>

</section>

<!-- ================= FORM ================= -->

<section class="academic-section">

<div class="container">

<div class="academic-container">

<h2>
Student Profile Information
</h2>

<form action="/academics" method="POST">

<div class="row">

<div class="col-md-6 mb-4">

<label>CGPA</label>

<input
type="number"
name="cgpa"
class="form-control"
placeholder="Enter CGPA"
step="0.01"
required>

</div>

<div class="col-md-6 mb-4">

<label>Number of Backlogs</label>

<input
type="number"
name="backlogs"
class="form-control"
placeholder="Enter backlogs"
required>

</div>

</div>

<div class="row">

<div class="col-md-6 mb-4">

<label>Internship Experience</label>

<select
name="internship"
class="form-control"
required>

<option value="">Select</option>
<option value="Yes">Yes</option>
<option value="No">No</option>

</select>

</div>

<div class="col-md-6 mb-4">

<label>Number of Projects</label>

<input
type="number"
name="projects"
class="form-control"
placeholder="Enter project count"
required>

</div>

</div>

<div class="row">

<div class="col-md-6 mb-4">

<label>Certifications</label>

<input
type="number"
name="certifications"
class="form-control"
placeholder="Number of certifications"
required>

</div>

<div class="col-md-6 mb-4">

<label>Aptitude Score</label>

<input
type="number"
name="aptitude"
class="form-control"
placeholder="Enter aptitude score"
required>

</div>

</div>

<div class="mb-4">

<label>Technical Skills</label>

<textarea
name="skills"
class="form-control"
rows="5"
placeholder="Example: Python, Java, MySQL, HTML, CSS"></textarea>

</div>

<button type="submit" class="continue-btn">

Continue Assessment

</button>

</form>

</div>

</div>

</section>

<!-- ================= FOOTER ================= -->

<footer>

<p>
Empowering Students. Enhancing Careers.
</p>

<p>

</p>

</footer>

</body>

</html>
